services:

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.4
    container_name: log-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -v '\"status\":\"red\"'"]
      interval: 10s
      timeout: 5s
      retries: 12

  # ── Redis (queue) ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: log-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend — HTTP ingestor + query API ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: log-backend
    ports:
      - "3000:3000"
    environment:
      NODE_ENV:           production
      PORT:               3000
      ES_URL:             http://elasticsearch:9200
      ES_INDEX:           logs
      REDIS_URL:          redis://redis:6379
      REDIS_QUEUE_KEY:    log_queue
      JWT_SECRET:         supersecret_change_in_prod
      BATCH_SIZE:         500
      FLUSH_INTERVAL_MS:  500
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Worker — drains Redis → bulk writes to ES ─────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: log-worker
    environment:
      NODE_ENV:           production
      ES_URL:             http://elasticsearch:9200
      ES_INDEX:           logs
      REDIS_URL:          redis://redis:6379
      REDIS_QUEUE_KEY:    log_queue
      BATCH_SIZE:         500
      FLUSH_INTERVAL_MS:  500
    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ── Frontend — React SPA served by nginx ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: log-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Kibana (optional — remove in production) ──────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.13.4
    container_name: log-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    profiles:
      - dev   # only starts with: docker compose --profile dev up

volumes:
  es_data:
    driver: local
  redis_data:
    driver: local