server {
    listen 80;
    root  /usr/share/nginx/html;
    index index.html;

    # ── Realtime SSE — must come before the generic /logs block ───────────────
    location /logs/stream {
        proxy_pass          http://backend:3000;
        proxy_http_version  1.1;

        # These three lines are mandatory for SSE to work through nginx
        proxy_set_header    Connection        "";
        proxy_set_header    Cache-Control     "no-cache";
        proxy_set_header    X-Accel-Buffering "no";

        proxy_buffering     off;
        proxy_read_timeout  86400s;
    }

    # ── REST API proxy ────────────────────────────────────────────────────────
    location /logs {
        proxy_pass          http://backend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /auth {
        proxy_pass          http://backend:3000;
        proxy_http_version  1.1;
        proxy_set_header    Host            $host;
        proxy_set_header    X-Real-IP       $remote_addr;
    }

    location /health {
        proxy_pass http://backend:3000;
    }

    # ── React SPA fallback — all unknown routes serve index.html ─────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Performance ───────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json
               application/javascript text/xml application/xml
               image/svg+xml;
    gzip_min_length 1000;

    # Cache hashed assets forever, never cache index.html
    location ~* \.(js|css|png|jpg|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"    always;
    add_header X-Content-Type-Options "nosniff"       always;
    add_header X-XSS-Protection       "1; mode=block" always;
}